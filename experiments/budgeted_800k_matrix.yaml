    block: normal_network
    scenario: S0_CLOUD_ONLY
    networkCondition: normal
    targetMessagesPerSecond: 90
    cloudMessagesPerSecond: 90
    durationSeconds: 300
    repetitions: 3
    cloudOutputPolicy: full
    estimatedPayloadBytes: 2048
    estimatedBillableMessages: 81000
