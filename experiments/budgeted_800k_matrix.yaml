id: budgeted_800k_s0_s1_s2
description: Budgeted one-day Azure IoT Edge study matrix capped below 800,000 IoT Hub messages.
dailyCloudMessageHardLimit: 800000
plannedCloudMessageLimit: 640000
cloudRateLimitMessagesPerSecond: 90
billableMessageChunkBytes: 4096
azure:
  iotHubSku: S1
  iotHubUnits: 2
  acrSku: Basic
defaults:
  deviceCount: 100
  estimatedPayloadBytes: 2048
experiments:
